pod:
  name: "test-pod"
  team: "Test Team"
  description: "A test pod for validation"

stack: "python-spark"

workflows:
  - ci-quality-gate

overrides:
  agents:
    include: []
    exclude: []
  rules:
    include: []
    exclude: []
  commands:
    include: []
    exclude: []

vars:
  repo_name: "test-repo"
  repo_host: "github"
  commit_format: "feat: <summary>"
  coverage_minimum: "80"
  primary_language: "python"
  test_command: "make test"
  lint_command: "make lint"
  ci_command: "make ci"
